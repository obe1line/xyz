[tasks.clean]
command = "cargo"
args = ["clean"]

[tasks.build_fw_f405]
command = "cargo"
args = ["build", "--color=always", "--features=embedded,stm32f405", "--target=thumbv7em-none-eabihf"]

[tasks.build_fw_c071]
command = "cargo"
args = ["build", "--color=always", "--features=embedded,stm32c071", "--target=thumbv6m-none-eabi"]

# unit tests for different OS targets
[tasks.unit_test]
linux_alias = "unit_test_linux"
windows_alias = "unit_test_windows"

[tasks.unit_test_windows]
command = "cargo"
args = ["test", "--color=always", "--features=std", "--target=x86_64-pc-windows-msvc"]
dependencies = ["clean"]

[tasks.unit_test_linux]
command = "cargo"
args = ["test", "--color=always", "--features=std", "--target=x86_64-unknown-linux-gnu"]
dependencies = ["clean"]